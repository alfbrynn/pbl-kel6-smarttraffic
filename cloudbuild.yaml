steps:
  # ============================================================
  # Step 1: Build Docker Image (multi-stage)
  # ============================================================
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - 'build'
      - '-t'
      - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/smartraf-repo/smartraf-web:$COMMIT_SHA'
      - '-t'
      - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/smartraf-repo/smartraf-web:latest'
      - '.'

  # ============================================================
  # Step 2: Push Image ke Artifact Registry
  # ============================================================
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args:
      - 'push'
      - '--all-tags'
      - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/smartraf-repo/smartraf-web'
    waitFor: ['build-image']

  # ============================================================
  # Step 3: Deploy ke Cloud Run
  # ============================================================
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-cloud-run'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'smartraf-web'
      - '--image'
      - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/smartraf-repo/smartraf-web:$COMMIT_SHA'
      - '--region'
      - 'asia-southeast1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '3000'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '3'
    waitFor: ['push-image']

# Image yang dihasilkan pipeline ini
images:
  - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/smartraf-repo/smartraf-web:$COMMIT_SHA'
  - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/smartraf-repo/smartraf-web:latest'

# Opsi Cloud Build
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_MEDIUM'

# Timeout build (default 10 menit, naikkan kalau build sering timeout)
timeout: '1200s'